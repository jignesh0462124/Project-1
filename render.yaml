services:
  # ─── Backend: Node.js / Express / Socket.io ───────────────────────────────
  - type: web
    name: collaborative-platform-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      # CORS must include the frontend Render URL — update after first deploy
      - key: CORS_ORIGINS
        value: https://collaborative-platform-client.onrender.com
      # ── Secrets: fill these in the Render dashboard after deploy ──────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JDOODLE_CLIENT_ID
        sync: false
      - key: JDOODLE_CLIENT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: deepseek/deepseek-v4-flash
      - key: OPENROUTER_FALLBACK_MODELS
        value: ""
      - key: OPENROUTER_HTTP_REFERER
        value: https://collaborative-platform-client.onrender.com
      - key: OPENROUTER_APP_TITLE
        value: Collaborative Platform
      - key: ANALYSIS_FALLBACK_ON_ERROR
        value: "true"

  # ─── Frontend: React + Vite (Static Site) ─────────────────────────────────
  - type: web
    name: collaborative-platform-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_OPTIONS
        value: --max-old-space-size=4096
      # Point to the backend Render URL — update after first deploy
      - key: VITE_SOCKET_URL
        value: https://collaborative-platform-server-f2va.onrender.com
      - key: VITE_API_URL
        value: https://collaborative-platform-server-f2va.onrender.com
      # ── Supabase browser keys: fill in the Render dashboard ───────────────
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
